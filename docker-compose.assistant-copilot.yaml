#ddev-generated
# Mount host GitHub CLI and Copilot config read-only into the seed directory.
# The post-start hook in config.assistant-copilot.yaml mirrors each seed into the
# writable runtime directory (~/.config/gh, ~/.copilot) on every start.
services:
  web:
    volumes:
      - "${HOME}/.config/gh:/home/${DDEV_USER}/.cred-seed/gh:ro"
      - "${HOME}/.copilot:/home/${DDEV_USER}/.cred-seed/copilot:ro"
