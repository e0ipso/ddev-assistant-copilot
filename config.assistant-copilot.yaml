#ddev-generated
hooks:
  pre-start:
    # Ensure host-side GitHub CLI and Copilot config dirs exist before Docker bind-mounts them.
    - exec-host: "mkdir -p ~/.config/gh ~/.copilot"
  post-start:
    # Mirror the read-only host gh seed into the writable runtime config directory on
    # every start. Host config is authoritative, so stale container-only files are
    # removed before copying.
    - exec: |
        set -eu
        seed_dir="${HOME}/.cred-seed/gh"
        target_dir="${HOME}/.config/gh"
        if [ -d "${seed_dir}" ]; then
          sudo rm -rf "${target_dir}"
          mkdir -p "${target_dir}"
          cp -R -P "${seed_dir}/." "${target_dir}/"
          sudo chown -R "$(id -u):$(id -g)" "${target_dir}"
          chmod 700 "${target_dir}"
          [ ! -f "${target_dir}/hosts.yml" ] || chmod 600 "${target_dir}/hosts.yml"
        fi
    # Mirror the read-only host Copilot seed into the writable runtime config directory.
    - exec: |
        set -eu
        seed_dir="${HOME}/.cred-seed/copilot"
        target_dir="${HOME}/.copilot"
        if [ -d "${seed_dir}" ]; then
          sudo rm -rf "${target_dir}"
          mkdir -p "${target_dir}"
          cp -R -P "${seed_dir}/." "${target_dir}/"
          sudo chown -R "$(id -u):$(id -g)" "${target_dir}"
          chmod 700 "${target_dir}"
        fi
    # Install GitHub Copilot CLI on every start; warn and continue on failure.
    - exec: |
        mkdir -p "${HOME}/.local/bin"
        if ! npm_config_ignore_scripts=false NPM_CONFIG_PREFIX="${HOME}/.local" npm install -g @github/copilot; then
          echo "ddev-assistant-copilot: warning: failed to install @github/copilot CLI" >&2
        fi
    # Export COPILOT_GITHUB_TOKEN and wire PATH/token into interactive and non-interactive shells.
    - exec: |
        set -eu
        marker="# ddev-assistant-copilot"
        COPILOT_GITHUB_TOKEN="$(gh auth token 2>/dev/null || true)"
        if [ -n "${COPILOT_GITHUB_TOKEN}" ]; then
          export COPILOT_GITHUB_TOKEN
        fi

        update_shell_file() {
          local file="$1"
          [ -f "${file}" ] || return 0
          if grep -q "${marker} begin" "${file}" 2>/dev/null; then
            sed -i "/${marker} begin/,/${marker} end/d" "${file}"
          fi
          {
            printf '%s\n' "${marker} begin"
            printf '%s\n' 'export PATH="${HOME}/.local/bin:${PATH}"'
            printf '%s\n' "export COPILOT_GITHUB_TOKEN=\"${COPILOT_GITHUB_TOKEN}\""
            printf '%s\n' "${marker} end"
          } >> "${file}"
        }

        touch "${HOME}/.bashrc"
        update_shell_file "${HOME}/.bashrc"
        update_shell_file "${HOME}/.profile"

        sudo touch /etc/bash.env
        if sudo grep -q "${marker} begin" /etc/bash.env 2>/dev/null; then
          sudo sed -i "/${marker} begin/,/${marker} end/d" /etc/bash.env
        fi
        {
          printf '%s\n' "${marker} begin"
          printf '%s\n' 'export PATH="${HOME}/.local/bin:${PATH}"'
          printf '%s\n' "export COPILOT_GITHUB_TOKEN=\"${COPILOT_GITHUB_TOKEN}\""
          printf '%s\n' "${marker} end"
        } | sudo tee -a /etc/bash.env >/dev/null

        # Ensure non-interactive shells (ddev exec) load /etc/bash.env until web-build sets BASH_ENV.
        if ! grep -q '/etc/bash.env' /etc/bash.nointeractive.bashrc 2>/dev/null; then
          echo '[ -f /etc/bash.env ] && . /etc/bash.env' | sudo tee -a /etc/bash.nointeractive.bashrc >/dev/null
        fi
        if [ ! -f /etc/profile.d/ddev-assistant-copilot.sh ] || ! grep -q 'BASH_ENV=/etc/bash.env' /etc/profile.d/ddev-assistant-copilot.sh 2>/dev/null; then
          echo 'export BASH_ENV=/etc/bash.env' | sudo tee /etc/profile.d/ddev-assistant-copilot.sh >/dev/null
        fi
